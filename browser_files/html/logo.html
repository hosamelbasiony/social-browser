<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Browser</title>
    <style>
      * {
        padding: 0;
        margin: 0;
      }
      html,
      body {
        overflow: hidden;
        background: #fff;
      }
      img {
        width: 100%;
        height: 100%;
      }
      html,
      body {
        background: radial-gradient(circle at top left, rgba(33, 168, 255, 0.12), transparent 36%), #07111f;
      }
      img {
        object-fit: cover;
        filter: saturate(1.08) contrast(1.04);
      }
    </style>
  </head>
  <body>
    <img src="browser://images/background.png" alt="" />
  </body>
</html>
