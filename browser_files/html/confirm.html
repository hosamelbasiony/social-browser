<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Window Confirm</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                overflow: hidden;
                box-sizing: border-box;
                background: #1e1e1e;
            }

            .social-confirm-box {
                background: transparent;
                color: #fff;
                padding: 25px;
                font-family: Arial, sans-serif;
            }

            .social-confirm-title {
                font-size: 18px;
                margin-bottom: 12px;
                opacity: 0.9;
            }

            .social-confirm-input {
                width: 100%;
                padding: 10px;
                border-radius: 8px;
                border: none;
                outline: none;
                margin-bottom: 15px;
                background: #2c2c2c;
                color: #fff;
            }

            .social-confirm-actions {
                display: flex;
                justify-content: flex-end;
                gap: 10px;
            }

            .social-confirm-btn {
                padding: 8px 14px;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-size: 14px;
            }

            .social-confirm-ok {
                background: #4caf50;
                color: white;
            }

            .social-confirm-cancel {
                background: #444;
                color: #ddd;
            }
            h2 {
                text-align: center;
            }
            body {
                background: radial-gradient(circle at top left, rgba(33, 168, 255, 0.12), transparent 36%), #07111f;
            }
            .social-confirm-box {
                background: rgba(13, 27, 46, 0.88);
                border: 1px solid #244664;
                border-radius: 12px;
                box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45);
                animation: social-dialog-enter 0.2s ease both;
            }
            .social-confirm-input {
                background: #0a1727;
                border: 1px solid #244664;
            }
            .social-confirm-btn {
                transition: transform 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
            }
            .social-confirm-btn:hover {
                transform: translateY(-1px);
                box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
            }
            .social-confirm-ok {
                background: linear-gradient(180deg, rgba(33, 168, 255, 0.14), rgba(16, 36, 58, 0.12)), #1a3350;
                border: 1px solid #2c5877;
            }
            .social-confirm-cancel {
                background: #0d1b2e;
                color: #b8c7d9;
                border: 1px solid #244664;
            }
            @keyframes social-dialog-enter {
                from {
                    opacity: 0;
                    transform: translateY(8px) scale(0.98);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }
        </style>
    </head>
    <body>
        <div class="social-confirm-box">
            <h2></h2>
            <div class="social-confirm-title"></div>
            <div class="social-confirm-actions">
                <button class="social-confirm-btn social-confirm-cancel">Cancel</button>
                <button class="social-confirm-btn social-confirm-ok">OK</button>
            </div>
        </div>

        <script>
            var _____ = globalThis.this;
            
            const site = document.querySelector('h2');
            const title = document.querySelector('.social-confirm-title');

            const ok = document.querySelector('.social-confirm-ok');
            const cancel = document.querySelector('.social-confirm-cancel');

            site.innerHTML = _____.customSetting.data.domain || '';
            title.textContent = _____.customSetting.data.message || '';

            ok.onclick = () => {
                _____.ipcSync('confirm-response', true);
                window.close();
            };

            cancel.onclick = () => {
                _____.ipcSync('confirm-response', false);
                window.close();
            };

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') ok.click();
                else if (e.key === 'Escape') cancel.click();
            });
        </script>
    </body>
</html>
