<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge,social=1" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
        <title>Social Browser</title>
        <meta name="description" content="Social Browser" />

        <link rel="stylesheet" href="http://127.0.0.1:60080/css/layout.css" />
        <link rel="stylesheet" href="http://127.0.0.1:60080/css/modal.css" />
        <link rel="stylesheet" href="http://127.0.0.1:60080/css/form.css" />
        <link rel="stylesheet" href="http://127.0.0.1:60080/css/color.css" />
        <link rel="stylesheet" href="http://127.0.0.1:60080/css/effect.css" />
        <link rel="stylesheet" href="http://127.0.0.1:60080/css/table.css" />
        <link rel="stylesheet" href="http://127.0.0.1:60080/css/theme.css" />

        <link rel="stylesheet" href="http://127.0.0.1:60080/css/social.css" />
        <link rel="stylesheet" href="http://127.0.0.1:60080/css/browser-tabs.css" />

        <link rel="stylesheet" href="http://127.0.0.1:60080/css/font-awesome-6.css" />

        <link rel="stylesheet" href="http://127.0.0.1:60080/css/fonts.css" />

        <link rel="stylesheet" href="http://127.0.0.1:60080/css/browser-tabs-current-theme.css" />

        <style>
            html,
            body {
                font-family: 'Arabic';
                background: var(--social-background-color);
            }
            #body {
                top: 100px;
                left: 0px;
                right: 0px;
                height: 100%;
                bottom: 30px;
                position: fixed;
                width: 100%;
                opacity: 0.1;
            }
            .top-bar {
                left: 0px;
                right: 0px;
                height: 40px;
                position: fixed;
                opacity: 1;
                   background: var(--social-current-tab-fill);
                display: flex;
                flex-direction: row;
                flex-wrap: nowrap;
                align-content: center;
                justify-content: flex-start;
                align-items: center;
            }
            .bottom-bar {
                bottom: 0px;
                left: 0px;
                right: 0px;
                height: 40px;
                position: fixed;
                opacity: 1;
                  background: var(--social-surface-3);
                display: flex;
                flex-direction: row;
                flex-wrap: nowrap;
                align-content: center;
                justify-content: flex-start;
                align-items: center;
                border-top: 2px solid var(--social-current-tab-fill);
            }
            .bottom-bar p {
                display: inline;
                color: #ffeb3b;
                font-family: monospace;
            }
            a.space,
            a.space:hover {
                color: #435259;
                font-weight: bold;
                cursor: default;
            }
            html,
            body {
                background: radial-gradient(circle at top left, rgba(33, 168, 255, 0.12), transparent 34%), var(--social-background-color);
                color: var(--social-tab-color);
            }
            #body {
                animation: social-premium-enter 0.24s ease both;
            }
           
            .bottom-bar {
                box-shadow: 0 10px 28px var(--social-surface);
                border-color: var(--social-surface-2);
            }
            .bottom-bar p {
                color: #f5c84b;
            }
            a.space,
            a.space:hover {
                color: rgba(120, 147, 173, 0.5) !important;
            }
            i,
            svg,
            .social-address-bar a,
            .window-actions a {
                color: #49759b;
                text-shadow: 0 1px 10px var(--social-surface);
            }
        </style>
        <script>
            var _____ = globalThis.this;
        </script>
    </head>

    <body>
        <div class="browser-tabs app-region">
            <div title="Close Browser" class="social-close">
                <i class="fa-solid fa-xmark"></i>
            </div>
            <div title="Maximize Browser" class="social-maxmize">
                <i class="fa-regular fa-window-maximize"></i>
            </div>
            <div title="minimize Browser" class="social-minmize">
                <i class="fa fa-window-minimize"></i>
            </div>

            <div onclick="ipc('[show-profiles]')" id="user_name"></div>

            <div class="browser-tabs-content"></div>

            <div class="browser-tabs-bottom-bar"></div>
        </div>

        <div class="row social-address-bar">
            <div class="window-actions">
                <a title="Go Back Page" class="go-back" onclick="ipc('[window-go-back]')">
                    <i class="fa fa-arrow-left"></i>
                </a>
                <a title="Go Forward Page" class="go-forward" onclick="ipc('[window-go-forward]')">
                    <i class="fa fa-arrow-right"></i>
                </a>
                <a class="reload" title="Reload All Page Files" onclick="ipc('[window-reload]')">
                    <i class="fa fa-refresh"></i>
                </a>
                <div class="address-input pointer" onclick="showAddressbar()">
                    <div class="proxy"></div>
                    <div class="https protocol"></div>
                    <div class="http protocol"></div>
                    <div class="ftp protocol"></div>
                    <div class="file protocol"></div>
                    <div class="browser protocol"></div>
                    <p class="url"></p>
                </div>

                <a title="Copy URL" onclick="copyCurrentURL()">
                    <i class="fas fa-copy"></i>
                </a>
                <a class="space"> | </a>
                <a title="Bookmarks" class="bookmarks" onclick="showBookmarksMenu()">
                    <i class="fa fa-star"></i>
                </a>

                <a title="Downloads" onclick="showDownloads()">
                    <i class="fa fa-download"></i>
                </a>

                <a class="developer-tools" title="Developer Tools" onclick="ipc('[show-window-dev-tools]')">
                    <i class="fa fa-bug"></i>
                </a>

                <a title="Show Setting" id="setting" onclick="showSettingMenu()">
                    <i class="fa fa-bars"></i>
                </a>
            </div>
        </div>

        <div class="top-bar">
            <div class="window-actions">
                <a title="Show Window Menu List " onclick="_____.showWindowsMenu()">
                    <i class="fa-solid fa-window-restore"></i>
                </a>

                <a class="space"> | </a>

                <a title="Translate" onclick="ipc('[window-action]', { name: 'translate' })">
                    <i class="fas fa-language white"></i>
                </a>
                <a title="Open URL in  ( Chrome Browser Simulator ) [ Shared Cookies , User Data , Extentions ] " onclick="ipc('[window-action]', { name: 'open-in-chrome-session' })">
                    <i class="fa-brands fa-chrome"></i>
                </a>
                <a title="Open URL in  ( PC Ghost Window ) " onclick="ipc('[window-action]', { name: 'open-in-ghost-window' })">
                    <i class="fas fa-ghost"></i>
                </a>
                <a title="Open URL in  ( Mobile Ghost Window ) " onclick="ipc('[window-action]', { name: 'new-ghost-mobile-window' })">
                    <i class="fa-solid fa-ghost fa-xs"></i>
                </a>

                <a title="User Scripts" onclick="_____.showScriptListMenu()">
                    <i class="fa-solid fa-code brown"></i>
                </a>
                <a title="Take Screen Shot ( current Page )" onclick="ipc('[window-action]', { name: 'screen-shot' })">
                    <i class="fa-solid fa-camera"></i>
                </a>
                <a title="Save ( current Page )" onclick="ipc('[window-action]', { name: 'save-page' })">
                    <i class="fas fa-save"></i>
                </a>
                <a class="space"> | </a>

                <a title="Change User Proxy" onclick="_____.showUserProxyMenu()">
                    <i class="fa-solid fa-location-dot"></i>
                </a>
                <a title="Change User Agent" onclick="_____.showUserAgentMenu()">
                    <i class="fa-solid fa-globe"></i>
                </a>
                <a title="Free Social Tools" onclick="_____.showSocialTools()">
                    <i class="fa-solid fa-toolbox"></i>
                </a>
                <a title="Social Temp Mails" onclick="_____.showTempMails()">
                    <i class="fa-solid fa-envelope"></i>
                </a>
                <a class="space"> | </a>

                <a title="Mute Page Audio" class="Page-audio" onclick="ipc('[window-action]', { name: 'toggle-window-audio' })">
                    <i class="fa fa-volume-up"></i>
                </a>

                <a class="space"> | </a>

                <a title="Re-Play" onclick="ipc('[window-action]', { name: 'reset-video', levels: true })">
                    <i class="fa-solid fa-backward-step"></i>
                </a>
                <a title="-60 sec" onclick="ipc('[window-action]', { name: '-60s-video', levels: true })">
                    <i class="fa-solid fa-backward-fast"></i>
                </a>
                <a title="-10 sec" onclick="ipc('[window-action]', { name: '-10s-video', levels: true })">
                    <i class="fa-solid fa-backward"></i>
                </a>
                <a title="Play video" onclick="ipc('[window-action]', { name: 'play-video', levels: true })">
                    <i class="fa-solid fa-play"></i>
                </a>
                <a title="Pause Video" onclick="ipc('[window-action]', { name: 'pause-video', levels: true })">
                    <i class="fa-solid fa-pause"></i>
                </a>
                <a title="+10 sec" onclick="ipc('[window-action]', { name: '+10s-video', levels: true })">
                    <i class="fa-solid fa-forward"></i>
                </a>
                <a title="+60 sec" onclick="ipc('[window-action]', { name: '+60s-video', levels: true })">
                    <i class="fa-solid fa-forward-fast"></i>
                </a>
                <a title="Skip Video" onclick="ipc('[window-action]', { name: 'skip-video', levels: true })">
                    <i class="fa-solid fa-forward-step orange"></i>
                </a>
                <a title="Show Video in TV Mode" onclick="ipc('[window-action]', { name: 'tv-mode', levels: true })">
                    <i class="fa-solid fa-tv"></i>
                </a>
                <a class="space"> | </a>
                <a class="xzoom" title="Zoom Out" onclick="ipc('[window-action]', { name: 'window-zoom-' })">
                    <i class="fa fa-search-minus"></i>
                </a>
                <a class="xzoom" title="Zoom In" onclick="ipc('[window-action]', { name: 'window-zoom+' })">
                    <i class="fa fa-search-plus"></i>
                </a>
            </div>
        </div>

        <div id="body"></div>

        <div class="bottom-bar">
            <div class="window-actions">
                <a title="Window Custom Settings" onclick="_____.showWindowCustomSetting()">
                    <i class="fa-solid fa-gear"></i>
                </a>

                <a class="space"> | </a>

                <a title="Integrated Sites" onclick="_____.showIntegratedSiteMenu()">
                    <i class="fa-solid fa-link"></i>
                </a>

                <a class="space"> | </a>

                <a title="Social Sites" onclick="_____.showSocialSiteMenu()">
                    <i class="fa-solid fa-users"></i>
                </a>

                <a class="space"> | </a>

                <a title="AI Tools" onclick="_____.showAIMenu()">
                    <i class="fa-solid fa-robot"></i>
                </a>

                <a class="space"> | </a>
                <p id="ipInfo" title="click to Reload IP Information" onclick="IPhandle()">...........</p>

                <a class="space"> | </a>
            </div>
        </div>

        <script src="http://127.0.0.1:60080/js/an.min.js"></script>

        <script>
            if (typeof module === 'object') {
                window.module = module;
                module = undefined;
            }
            function showMessage(msg) {
                _____.ipc('[alert]', { message: msg, windowID: _____.window.id });
            }

            function IPhandle() {
                clearTimeout(_____.IPhandleTimeout);
                document.querySelector('#ipInfo').innerText = '.........';
                _____.getIPinformation()
                    .then((d) => {
                        document.querySelector('#ipInfo').innerText = `${d.query} - ${d.country} - ${d.city}`;
                    })
                    .catch((e) => {
                        _____.IPhandleTimeout = setTimeout(() => {
                            IPhandle();
                        }, 1000 * 60);
                    });
            }

            IPhandle();
        </script>

        <script src="http://127.0.0.1:60080/js/client.js"></script>
        <script src="http://127.0.0.1:60080/js/jquery.js"></script>

        <script src="http://127.0.0.1:60080/js/draggabilly.js"></script>
        <script src="http://127.0.0.1:60080/js/browser-tabs.js"></script>
        <script src="http://127.0.0.1:60080/js/social.js"></script>

        <script>
            if (window.module) module = window.module;
        </script>

    </body>
</html>
